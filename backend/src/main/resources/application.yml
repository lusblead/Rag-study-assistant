spring:
  application:
    name: rag-study-assistant

  autoconfigure:
    exclude:
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/rag_study_assistant?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true}
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:root}

  sql:
    init:
      mode: always
      schema-locations: classpath:db/schema.sql
      continue-on-error: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

app:
  upload:
    dir: ${APP_UPLOAD_DIR:./uploads}

milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection-name: ${MILVUS_COLLECTION:knowledge_chunk_vectors}
  embedding-dimension: ${EMBEDDING_DIMENSION:1536}

rag:
  top-k: ${RAG_TOP_K:5}

agent:
  # false = use MilvusVectorStoreService + LocalHashEmbeddingClient + LocalChatClient by default.
  # true  = use pure in-memory mocks for quick backend-only debugging.
  mock: ${AGENT_MOCK:false}

llm:
  provider: ${LLM_PROVIDER:local}
  api-key: ${LLM_API_KEY:}
  model: ${LLM_MODEL:local-rag-chat}

embedding:
  provider: ${EMBEDDING_PROVIDER:local}
  api-key: ${EMBEDDING_API_KEY:}
  model: ${EMBEDDING_MODEL:local-hash-embedding}