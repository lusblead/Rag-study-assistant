services:
  mysql:
    image: mysql:8.0
    container_name: rag-study-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rag_study_assistant
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag-study-etcd
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_QUOTA_BACKEND_BYTES: "4294967296"
      ETCD_SNAPSHOT_COUNT: "50000"
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    volumes:
      - etcd_data:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: rag-study-minio
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  milvus:
    image: milvusdb/milvus:v2.4.11
    container_name: rag-study-milvus
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: rag-study-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/rag_study_assistant?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
      MYSQL_USER: root
      MYSQL_PASSWORD: root
      MILVUS_HOST: milvus
      MILVUS_PORT: 19530
      MILVUS_COLLECTION: ${MILVUS_COLLECTION:-knowledge_chunk_vectors_bge_m3}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      RAG_TOP_K: ${RAG_TOP_K:-5}
      RAG_CANDIDATE_K: ${RAG_CANDIDATE_K:-20}
      RAG_SIMILARITY_THRESHOLD: ${RAG_SIMILARITY_THRESHOLD:-0.2}
      RAG_HISTORY_LIMIT: ${RAG_HISTORY_LIMIT:-8}
      RERANK_PROVIDER: ${RERANK_PROVIDER:-local}
      RERANK_BASE_URL: ${RERANK_BASE_URL:-https://api.siliconflow.cn/v1}
      RERANK_API_KEY: ${RERANK_API_KEY:-}
      RERANK_MODEL: ${RERANK_MODEL:-BAAI/bge-reranker-v2-m3}
      RERANK_FAIL_OPEN: ${RERANK_FAIL_OPEN:-true}
      AGENT_MOCK: ${AGENT_MOCK:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.deepseek.com}
      LLM_API_KEY: ${LLM_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-deepseek-v4-pro}
      LLM_THINKING: ${LLM_THINKING:-false}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai-compatible}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-https://api.siliconflow.com/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-m3}
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      milvus:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: rag-study-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  etcd_data:
  minio_data:
  milvus_data:
  uploads_data:
