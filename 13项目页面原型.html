<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>课程设计原型</title>
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; background-color: #f4f4f4; }
        .header { background: white; padding: 15px; border-bottom: 1px solid #ddd; }
        .container { max-width: 800px; margin: 50px auto; }
        .card { background: white; padding: 30px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        p { color: #666; line-height: 1.6; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <strong>DeepSeek 课程助手</strong>
    </div>

    <div class="container">
        <div class="card">
            <h1>📚 知识库管理</h1>
            <p>功能：上传文档、处理文档、查看文档列表。</p>
            <button>进入管理</button>
        </div>

        <div class="card">
            <h1>💬 开始对话</h1>
            <p>功能：与 DeepSeek 模型进行对话，支持 RAG 检索。</p>
            <button>开始聊天</button>
        </div>
    </div>

</body>
</html>
